<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>ARPG</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: #000;
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      canvas { display: block; touch-action: none; }
    </style>
  </head>
  <body>
    <script>
      // Fuerza DPR=1 ANTES de que Phaser lo lea — evita canvas 3x en phones de alta densidad.
      // Si window no es configurable, parchea el prototype de Window como fallback.
      ;(function() {
        function forceDPR1() {
          try {
            Object.defineProperty(window, 'devicePixelRatio', { get: () => 1, configurable: true })
          } catch(e) {}
          // Verificar que funcionó; si no, parchear en el prototipo
          if (window.devicePixelRatio !== 1) {
            try {
              Object.defineProperty(Object.getPrototypeOf(window), 'devicePixelRatio', { get: () => 1, configurable: true })
            } catch(e) {}
          }
        }
        forceDPR1()
      })()
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
